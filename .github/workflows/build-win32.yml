# UABE_AOV - GitHub Actions Build (Windows 32-bit)
# Builds UABE with AOV (Arena of Valor / Lien Quan Mobile) AssetBundle support.
# UnityFS 2022.3.5f1 format: AES-128-CBC encrypted header + custom BlockInfo/DirInfo layout.

name: Build UABE_AOV Win32

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-win32:
    name: Windows x86 (32-bit) Release
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. Setup MSBuild ─────────────────────────────────────────
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ── 3. Configure CMake (Win32 / x86) ─────────────────────────
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build `
                -A Win32 `
                -G "Visual Studio 17 2022" `
                -DCMAKE_BUILD_TYPE=Release `
                -DCMAKE_SYSTEM_VERSION=10.0 `
                -Wno-dev

      # ── 4. Build ─────────────────────────────────────────────────
      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      # ── 5. Collect output binaries ───────────────────────────────
      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $binPaths = @(
            "build\bin\Release",
            "build\bin",
            "build\Release"
          )
          foreach ($p in $binPaths) {
            if (Test-Path $p) {
              Get-ChildItem "$p\*.exe","$p\*.dll" -ErrorAction SilentlyContinue |
                Copy-Item -Destination dist -Force
            }
          }
          Write-Host "=== dist contents ==="
          Get-ChildItem dist

      # ── 6. Upload artifact ───────────────────────────────────────
      - name: Upload UABE_AOV Win32 binaries
        uses: actions/upload-artifact@v4
        with:
          name: UABE_AOV_Win32_Release
          path: dist/
          if-no-files-found: warn
          retention-days: 30

      # ── 7. Create GitHub Release on version tags ─────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
